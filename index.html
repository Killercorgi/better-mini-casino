<!DOCTYPE html>
<html>
<head>
  <title>Mini Casino</title>

  <style>
  body {
    margin:0;
    font-family:Arial;
    color:white;

    background: linear-gradient(-45deg, #000000, #3a0000, #660000, #000000);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
  }

  @keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  h1, h2 {
    text-align:center;
    color:gold;
    text-shadow: 0 0 10px gold, 0 0 20px gold;
  }

  button {
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:gold;
    cursor:pointer;
    font-weight:bold;
  }

  button:hover {
    box-shadow: 0 0 20px gold, 0 0 40px gold;
  }

  .card {
    background:#1a1a1a;
    box-shadow: 0 0 25px gold;
  }

  /* 🎡 Wheel */
  #wheel {
    width:300px;
    height:300px;
    border-radius:50%;
    border:8px solid gold;
    margin:20px auto;
    position:relative;
    background: repeating-conic-gradient(
      red 0deg 10deg,
      black 10deg 20deg
    );
    box-shadow: 0 0 30px red, 0 0 60px gold;
    transition: transform 4s ease-out;
  }

  /* Numbers on wheel */
  .number {
    position:absolute;
    left:50%;
    top:50%;
    transform-origin:0 0;
    font-size:12px;
    color:white;
    text-shadow: 0 0 5px black;
  }
  </style>
</head>

<body>

<h1>🎰 Mini Casino 🎰</h1>

<p id="money" style="text-align:center;">Balance: $100</p>

<div style="text-align:center;">
  <button onclick="takeLoan()">💵 Take $100 Loan</button>
  <p id="debt">Debt: $0</p>
</div>

<!-- 🎰 SLOT -->
<div style="display:flex; justify-content:center; margin-top:40px;">
  <div style="background:#1a1a1a; padding:30px; border-radius:20px; box-shadow:0 0 20px gold; text-align:center;">
    
    <h2>Slot Machine ($10)</h2>

    <div style="font-size:50px; background:black; padding:20px; border-radius:10px; border:2px solid gold;">
      <span id="s1">❓</span>
      <span id="s2">❓</span>
      <span id="s3">❓</span>
    </div>

    <br>
    <button onclick="spin()">SPIN</button>
    <p id="result"></p>

  </div>
</div>

<!-- 🎡 ROULETTE -->
<div style="text-align:center; margin-top:50px;">
  <h2>Roulette ($10)</h2>

  <div id="wheel"></div>

  <div style="
    width:0;height:0;
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-bottom:20px solid white;
    margin:auto;
  "></div>

  <br>
  <input id="betNumber" type="number" placeholder="Pick 0-35" min="0" max="35">
  <br><br>
  <button onclick="spinWheel()">Spin Wheel</button>

  <p id="rouletteMessage"></p>
</div>

<!-- 🔊 Sounds -->
<audio id="spinSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>
const symbols = ["🍒","🍋","⭐","🔔","7️⃣"];

let balance = localStorage.getItem("balance") 
  ? parseInt(localStorage.getItem("balance")) 
  : 100;

let debt = localStorage.getItem("debt") 
  ? parseInt(localStorage.getItem("debt")) 
  : 0;

let bet = 10;

// 💵 Loan
function takeLoan() {
  balance += 100;
  debt += 100;
  updateDisplay();
}

// 🎰 SLOT
function spin() {
  if (balance < bet) return alert("Not enough money!");

  balance -= bet;
  playSound("spinSound");

  let spins = 10, count = 0;

  let interval = setInterval(() => {
    s1.textContent = randomSymbol();
    s2.textContent = randomSymbol();
    s3.textContent = randomSymbol();

    count++;
    if (count >= spins) {
      clearInterval(interval);
      finalResult();
    }
  }, 100);
}

function randomSymbol() {
  return symbols[Math.floor(Math.random()*symbols.length)];
}

function finalResult() {
  let a = randomSymbol(), b = randomSymbol(), c = randomSymbol();

  s1.textContent = a;
  s2.textContent = b;
  s3.textContent = c;

  let win = 0;

  if (a===b && b===c) {
    result.textContent = "JACKPOT +50";
    playSound("winSound");
    win = 50;
  } else if (a===b || b===c || a===c) {
    result.textContent = "Small win +20";
    win = 20;
  } else {
    result.textContent = "You lost";
  }

  applyWinnings(win);
}

// 🎡 CREATE NUMBERS ON WHEEL
const wheel = document.getElementById("wheel");

for (let i=0; i<36; i++) {
  let num = document.createElement("div");
  num.className = "number";
  num.textContent = i;

  let angle = i * 10;
  num.style.transform = `rotate(${angle}deg) translate(120px) rotate(-${angle}deg)`;

  wheel.appendChild(num);
}

// 🎡 SPIN
function spinWheel() {
  if (balance < bet) return alert("Not enough money!");

  balance -= bet;

  let spinDeg = Math.floor(Math.random()*360) + 1440;
  wheel.style.transform = `rotate(${spinDeg}deg)`;

  let resultNum = Math.floor((spinDeg % 360) / 10);
  let pick = parseInt(betNumber.value);

  setTimeout(() => {
    let win = 0;

    if (pick === resultNum) {
      rouletteMessage.textContent = `JACKPOT! ${resultNum}`;
      playSound("winSound");
      win = 100;
    } else {
      rouletteMessage.textContent = `Result: ${resultNum}`;
    }

    applyWinnings(win);
  }, 4000);
}

// 💸 Apply winnings + debt
function applyWinnings(amount) {
  balance += amount;

  if (debt > 0) {
    let pay = Math.min(balance, debt);
    balance -= pay;
    debt -= pay;
  }

  updateDisplay();
}

// 🔊 Sound
function playSound(id) {
  let s = document.getElementById(id);
  s.currentTime = 0;
  s.play().catch(()=>{});
}

// 🔄 Update UI
function updateDisplay() {
  money.textContent = "Balance: $" + balance;
  document.getElementById("debt").textContent = "Debt: $" + debt;

  localStorage.setItem("balance", balance);
  localStorage.setItem("debt", debt);
}

updateDisplay();
</script>

</body>
</html>
